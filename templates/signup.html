<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up | SkillSync AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="alert alert-info py-2 small">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <div class="card p-4 shadow-sm border-0" style="border-radius: 16px;">
                <h3 class="text-center fw-bold mb-4">Create Account</h3>
                <form method="POST" action="/signup">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Personal Email ID</label>
                        <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Create Password</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Sign Up</button>
                </form>
                <div class="mt-4 text-center">
                    <p class="small text-muted">Already have an account? <a href="/login" class="text-primary text-decoration-none fw-bold">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
